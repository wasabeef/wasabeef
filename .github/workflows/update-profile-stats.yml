name: Update Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  update-profile-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Decide whether to update today
        id: cadence
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run detected. Continuing."
            exit 0
          fi

          if [ $(( RANDOM % 2 )) -eq 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled run selected. Continuing."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled run skipped today."
          fi

      - name: Checkout
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_REPO_WASABEEF }}

      - name: Setup Python
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve JST cache buster
        if: steps.cadence.outputs.should_run == 'true'
        id: cache_buster
        run: echo "jst_date=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_OUTPUT"

      - name: Update README cache buster
        if: steps.cadence.outputs.should_run == 'true'
        env:
          CACHE_BUSTER: ${{ steps.cache_buster.outputs.jst_date }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          cache_buster = os.environ["CACHE_BUSTER"]
          path = Path("README.md")
          text = path.read_text()
          filenames = (
              "github-stats",
              "github-most-used-languages",
              "github-top-repositories",
              "github-recent-releases",
          )

          for filename in filenames:
              pattern = rf'(\./generated/{re.escape(filename)}\.svg)(\?v=\d{{4}}-\d{{2}}-\d{{2}})?'
              replacement = rf'\1?v={cache_buster}'
              text = re.sub(pattern, replacement, text)

          path.write_text(text)
          PY

      - name: Generate SVG cards
        if: steps.cadence.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_REPO_WASABEEF }}
          PROFILE_USERNAME: wasabeef
        run: python3 scripts/generate_profile_stats.py

      - name: Commit updated profile assets
        if: steps.cadence.outputs.should_run == 'true'
        run: |
          if git diff --quiet -- README.md generated; then
            echo "No profile asset updates"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md generated/*.svg
          git commit -m "chore: update profile stats"
          git push
